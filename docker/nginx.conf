# ============================================
# StellarIDE — Nginx Reverse Proxy
# ============================================
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # ── Compression ──────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/wasm;

    # ── Logging ───────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;

        # ── Serve React Frontend ──────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Proxy REST API to Axum Backend ────
        # /api/* routes go to backend:8080
        location /api/ {
            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Disable buffering for SSE streaming
            # This allows live logs to reach browser instantly
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── WebSocket for Live Collaboration ──
        # /ws/* routes get upgraded to WebSocket
        location /ws/ {
            proxy_pass         http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;

            # Long timeout for persistent WS connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
